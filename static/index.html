<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrapper Service Tester</title>
    <style>
        body {
            font-family: monospace;
            background: white;
            color: black;
            margin: 20px;
            padding: 0;
            line-height: 1.4;
        }
        h2 {
            margin-top: 0;
            border-bottom: 1px solid black;
            padding-bottom: 5px;
            font-size: 16px;
            text-transform: uppercase;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .section {
            border: 1px solid black;
            padding: 15px;
            background: white;
        }
        .full-width {
            grid-column: span 2;
        }
        .form-group {
            margin-bottom: 10px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 3px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            padding: 6px;
            border: 1px solid black;
            background: white;
            color: black;
            font-family: monospace;
        }
        input:focus {
            outline: none;
            background: #fafafa;
        }
        button {
            padding: 8px 15px;
            border: 1px solid black;
            background: white;
            color: black;
            font-family: monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }
        button:hover {
            background: black;
            color: white;
        }
        button:disabled {
            border-color: #ccc;
            color: #ccc;
            cursor: not-allowed;
            background: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid black;
            padding: 6px 8px;
            text-align: left;
            font-size: 12px;
            vertical-align: top;
            word-break: break-all;
        }
        th {
            background: #eee;
            font-weight: bold;
        }
        .status {
            font-weight: bold;
            margin-top: 10px;
            font-size: 13px;
        }
        .badge {
            display: inline-block;
            padding: 2px 5px;
            font-size: 10px;
            border: 1px solid black;
            background: #f0f0f0;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SCRAPPER SERVICES TEST PANEL</h1>
        <hr style="border: 0; border-top: 1px solid black; margin-bottom: 20px;">

        <div class="grid">
            <!-- Discovery Standalone -->
            <div class="section">
                <h2>1. Google Maps Discovery (Standalone)</h2>
                <div class="form-group">
                    <label>Keyword</label>
                    <input type="text" id="disc-keyword" placeholder="e.g. dentists">
                </div>
                <div class="form-group">
                    <label>Area</label>
                    <input type="text" id="disc-area" placeholder="e.g. Coimbatore">
                </div>
                <div class="form-group">
                    <label>Max Results</label>
                    <input type="number" id="disc-max" value="5" min="1" max="100">
                </div>
                <button id="btn-disc-run" onclick="runDiscovery()">Run Discovery</button>
                <div class="status" id="disc-status">Idle</div>
            </div>

            <!-- Enrichment Standalone -->
            <div class="section">
                <h2>2. Website Enrichment (Standalone)</h2>
                <div class="form-group">
                    <label>Website URL</label>
                    <input type="text" id="enrich-url" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label>Name Hint (Optional)</label>
                    <input type="text" id="enrich-name" placeholder="e.g. Example Dental Clinic">
                </div>
                <button id="btn-enrich-run" onclick="runEnrichment()">Run Enrichment</button>
                <div class="status" id="enrich-status">Idle</div>
            </div>

            <!-- Together Pipeline -->
            <div class="section full-width">
                <h2>3. Combined Test (Discovery + Enrichment)</h2>
                <div class="grid" style="grid-template-columns: 1fr 1fr 1fr; margin-bottom: 0; gap: 10px;">
                    <div class="form-group">
                        <label>Keyword</label>
                        <input type="text" id="comb-keyword" placeholder="e.g. pet shops">
                    </div>
                    <div class="form-group">
                        <label>Area</label>
                        <input type="text" id="comb-area" placeholder="e.g. Coimbatore">
                    </div>
                    <div class="form-group">
                        <label>Max Results</label>
                        <input type="number" id="comb-max" value="3" min="1" max="50">
                    </div>
                </div>
                <button id="btn-comb-run" onclick="runCombined()">Run Combined Service</button>
                <div class="status" id="comb-status">Idle</div>
            </div>

            <!-- Results Section -->
            <div class="section full-width">
                <h2>Results Output</h2>
                <div id="results-table-container" style="display: none;">
                    <table id="results-table">
                        <thead>
                            <tr id="results-headers">
                                <!-- Headers populated dynamically -->
                            </tr>
                        </thead>
                        <tbody id="results-body">
                            <!-- Body populated dynamically -->
                        </tbody>
                    </table>
                </div>
                <div id="results-placeholder" style="color: #666; font-size: 13px; text-align: center; padding: 20px;">
                    Run a service to see table results.
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "change-me-in-production";
        const BASE_URL = window.location.origin;

        async function makeRequest(endpoint, body) {
            const res = await fetch(`${BASE_URL}${endpoint}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': API_KEY
                },
                body: JSON.stringify(body)
            });
            if (!res.ok) {
                const text = await res.text();
                throw new Error(`HTTP ${res.status}: ${text}`);
            }
            return await res.json();
        }

        function setStatus(elementId, text, isError = false) {
            const el = document.getElementById(elementId);
            el.innerText = text;
            el.style.color = isError ? 'red' : 'black';
        }

        function showTable(headers) {
            document.getElementById('results-placeholder').style.display = 'none';
            document.getElementById('results-table-container').style.display = 'block';
            
            const headerRow = document.getElementById('results-headers');
            headerRow.innerHTML = headers.map(h => `<th>${h}</th>`).join('');
            
            document.getElementById('results-body').innerHTML = '';
        }

        async function runDiscovery() {
            const keyword = document.getElementById('disc-keyword').value.trim();
            const area = document.getElementById('disc-area').value.trim();
            const maxResults = parseInt(document.getElementById('disc-max').value, 10);

            if (!keyword || !area) {
                alert('Please enter keyword and area.');
                return;
            }

            setStatus('disc-status', 'Searching Google Maps...');
            document.getElementById('btn-disc-run').disabled = true;

            try {
                const data = await makeRequest('/discovery', {
                    keyword: keyword,
                    area: area,
                    max_results: maxResults
                });

                setStatus('disc-status', `Discovery complete. Found ${data.length} businesses.`);
                showTable(['Company Name', 'Website', 'Phone', 'Rating', 'Reviews', 'Maps Link']);

                const tbody = document.getElementById('results-body');
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align: center;">No businesses found.</td></tr>`;
                } else {
                    tbody.innerHTML = data.map(biz => `
                        <tr>
                            <td><strong>${biz.name || '—'}</strong></td>
                            <td>${biz.website ? `<a href="${biz.website}" target="_blank">${biz.website}</a>` : '—'}</td>
                            <td>${biz.phone || '—'}</td>
                            <td>${biz.rating !== null ? biz.rating : '—'}</td>
                            <td>${biz.review_count !== null ? biz.review_count : '—'}</td>
                            <td>${biz.maps_url ? `<a href="${biz.maps_url}" target="_blank">View on Maps</a>` : '—'}</td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                setStatus('disc-status', `Error: ${err.message}`, true);
            } finally {
                document.getElementById('btn-disc-run').disabled = false;
            }
        }

        async function runEnrichment() {
            const url = document.getElementById('enrich-url').value.trim();
            const nameHint = document.getElementById('enrich-name').value.trim();

            if (!url) {
                alert('Please enter a website URL.');
                return;
            }

            setStatus('enrich-status', 'Scraping website for contacts...');
            document.getElementById('btn-enrich-run').disabled = true;

            try {
                const data = await makeRequest('/enrichment', {
                    website: url,
                    name_hint: nameHint
                });

                document.getElementById('btn-enrich-run').disabled = false;

                if (!data) {
                    setStatus('enrich-status', 'Scraping completed. No contacts found.');
                    showTable(['Field', 'Extracted Value']);
                    document.getElementById('results-body').innerHTML = `
                        <tr>
                            <td><strong>Status</strong></td>
                            <td>No emails, phones or social links found.</td>
                        </tr>
                    `;
                    return;
                }

                setStatus('enrich-status', 'Scraping complete.');
                showTable(['Detail Field', 'Value(s) Found']);

                const tbody = document.getElementById('results-body');
                
                const addRow = (field, val) => {
                    const content = Array.isArray(val) 
                        ? val.map(v => `<span class="badge">${v}</span>`).join(' ')
                        : val;
                    return `<tr><td><strong>${field}</strong></td><td>${content || '—'}</td></tr>`;
                };

                tbody.innerHTML = 
                    addRow('Company Name (Title)', data.company) +
                    addRow('Emails', data.emails) +
                    addRow('Phones', data.phones) +
                    addRow('WhatsApp', data.whatsapp_numbers) +
                    addRow('Social Links', data.social_links) +
                    addRow('Contact Pages Visited', data.contact_pages) +
                    addRow('Total Pages Crawled', data.pages_crawled);

            } catch (err) {
                setStatus('enrich-status', `Error: ${err.message}`, true);
                document.getElementById('btn-enrich-run').disabled = false;
            }
        }

        async function runCombined() {
            const keyword = document.getElementById('comb-keyword').value.trim();
            const area = document.getElementById('comb-area').value.trim();
            const maxResults = parseInt(document.getElementById('comb-max').value, 10);

            if (!keyword || !area) {
                alert('Please enter keyword and area.');
                return;
            }

            setStatus('comb-status', 'Step 1: Running Discovery...');
            document.getElementById('btn-comb-run').disabled = true;

            try {
                // Step 1: Run Discovery
                const businesses = await makeRequest('/discovery', {
                    keyword: keyword,
                    area: area,
                    max_results: maxResults
                });

                if (businesses.length === 0) {
                    setStatus('comb-status', 'Discovery complete. No businesses found.');
                    showTable(['Company', 'Website', 'Contacts']);
                    document.getElementById('results-body').innerHTML = `<tr><td colspan="3" style="text-align: center;">No businesses found.</td></tr>`;
                    document.getElementById('btn-comb-run').disabled = false;
                    return;
                }

                setStatus('comb-status', `Step 2: Discovered ${businesses.length} items. Starting Enrichment...`);
                showTable(['Company Name', 'Website', 'Emails', 'Phones', 'Socials', 'Enrichment Status']);

                const tbody = document.getElementById('results-body');
                
                // Render table outline
                tbody.innerHTML = businesses.map((biz, idx) => `
                    <tr id="row-${idx}">
                        <td>
                            <strong>${biz.name}</strong><br>
                            <span style="font-size: 10px; color: #555;">Rating: ${biz.rating !== null ? biz.rating : '—'} (${biz.review_count !== null ? biz.review_count : '—'} reviews)</span>
                        </td>
                        <td>${biz.website ? `<a href="${biz.website}" target="_blank">${biz.website}</a>` : '—'}</td>
                        <td id="emails-${idx}">—</td>
                        <td id="phones-${idx}">—</td>
                        <td id="socials-${idx}">—</td>
                        <td id="status-${idx}">${biz.website ? 'Queued' : 'No Website (Skipped)'}</td>
                    </tr>
                `).join('');

                // Step 2: Enrich websites sequentially
                let completed = 0;
                for (let i = 0; i < businesses.length; i++) {
                    const biz = businesses[i];
                    if (!biz.website) {
                        completed++;
                        setStatus('comb-status', `Enrichment: ${completed}/${businesses.length} items completed...`);
                        continue;
                    }

                    document.getElementById(`status-${i}`).innerText = 'Scraping...';
                    document.getElementById(`status-${i}`).style.color = 'blue';

                    try {
                        const contacts = await makeRequest('/enrichment', {
                            website: biz.website,
                            name_hint: biz.name
                        });

                        const statusEl = document.getElementById(`status-${i}`);
                        if (contacts) {
                            statusEl.innerText = 'Enriched';
                            statusEl.style.color = 'green';

                            if (contacts.emails && contacts.emails.length > 0) {
                                document.getElementById(`emails-${i}`).innerHTML = contacts.emails.map(e => `<span class="badge">${e}</span>`).join(' ');
                            }
                            if (contacts.phones && contacts.phones.length > 0) {
                                document.getElementById(`phones-${i}`).innerHTML = contacts.phones.map(p => `<span class="badge">${p}</span>`).join(' ');
                            }
                            if (contacts.social_links && contacts.social_links.length > 0) {
                                document.getElementById(`socials-${i}`).innerHTML = contacts.social_links.map(link => {
                                    try {
                                        const domain = new URL(link).hostname.replace('www.', '');
                                        return `<a href="${link}" target="_blank" style="margin-right:5px; text-decoration:underline;">${domain}</a>`;
                                    } catch(e) {
                                        return `<a href="${link}" target="_blank" style="margin-right:5px; text-decoration:underline;">link</a>`;
                                    }
                                }).join(' ');
                            }
                        } else {
                            statusEl.innerText = 'No contacts';
                            statusEl.style.color = '#777';
                        }
                    } catch (enrichErr) {
                        console.error(`Enrichment failed for ${biz.website}:`, enrichErr);
                        const statusEl = document.getElementById(`status-${i}`);
                        statusEl.innerText = 'Scrape Failed';
                        statusEl.style.color = 'red';
                    }

                    completed++;
                    setStatus('comb-status', `Enrichment: ${completed}/${businesses.length} items completed...`);
                }

                setStatus('comb-status', `Combined run finished. ${completed}/${businesses.length} processed.`);

            } catch (err) {
                setStatus('comb-status', `Error: ${err.message}`, true);
            } finally {
                document.getElementById('btn-comb-run').disabled = false;
            }
        }
    </script>
</body>
</html>
